{% extends "base.html" %}
{% block title %}Post New Drive – PlacePro{% endblock %}
{% block content %}
<div class="pp-page">
  <div class="pp-page-header">
    <div>
      <a href="{{ url_for('company_dashboard') }}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Dashboard</a>
      <h4 class="pp-page-title mt-1"><i class="bi bi-plus-circle me-2"></i>Post New Placement Drive</h4>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="pp-card">
        <div class="pp-card-header">
          <span>Drive Details</span>
          <div class="pp-info-inline"><i class="bi bi-info-circle me-1"></i>Drive will go live after admin approval.</div>
        </div>
        <div class="pp-card-body">
          <form method="POST" action="{{ url_for('company_create_drive') }}" novalidate>

            <div class="form-section-title">Basic Information</div>
            <div class="row g-3 mb-3">
              <div class="col-12">
                <label class="form-label pp-label">Job Title <span class="req">*</span></label>
                <input type="text" name="job_title" class="form-control pp-input" placeholder="e.g. Software Development Engineer" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label pp-label">Location</label>
                <input type="text" name="location" class="form-control pp-input" placeholder="e.g. Bangalore / Remote / PAN India"/>
              </div>
              <div class="col-md-6">
                <label class="form-label pp-label">Package / CTC</label>
                <input type="text" name="package" class="form-control pp-input" placeholder="e.g. ₹12 LPA, ₹8-15 LPA"/>
              </div>
              <div class="col-md-6">
                <label class="form-label pp-label">Application Deadline</label>
                <input type="date" name="application_deadline" class="form-control pp-input"/>
              </div>
            </div>

            <div class="form-section-title">Job Description</div>
            <div class="mb-3">
              <textarea name="job_description" rows="5" class="form-control pp-input"
                placeholder="Describe the role, responsibilities, team, growth opportunities..."></textarea>
            </div>

            <div class="form-section-title">Eligibility Criteria</div>
            <div class="mb-4">
              <textarea name="eligibility_criteria" rows="3" class="form-control pp-input"
                placeholder="e.g. B.Tech CSE/IT/ECE, Min CGPA 7.0, 2025/2026 batch, No active backlogs..."></textarea>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn btn-pp-primary px-5">
                <i class="bi bi-send me-2"></i>Submit for Approval
              </button>
              <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-pp">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
