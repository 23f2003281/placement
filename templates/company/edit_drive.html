{% extends "base.html" %}
{% block title %}Edit Drive – PlacePro{% endblock %}
{% block content %}
<div class="pp-page">
  <div class="pp-page-header">
    <div><a href="{{ url_for('company_dashboard') }}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back</a><h4 class="pp-page-title mt-1"><i class="bi bi-pencil me-2"></i>Edit Drive</h4></div>
  </div>
  <div class="row justify-content-center"><div class="col-lg-8">
    <div class="pp-card">
      <div class="pp-card-header"><span>Editing: {{ drive['job_title'] }}</span><div class="pp-info-inline"><i class="bi bi-exclamation-triangle me-1 text-warning"></i>Editing requires re-approval.</div></div>
      <div class="pp-card-body">
        <form method="POST" action="{{ url_for('company_edit_drive', did=drive['id']) }}" novalidate>
          <div class="form-section-title">Basic Information</div>
          <div class="row g-3 mb-3">
            <div class="col-12"><label class="form-label pp-label">Job Title <span class="req">*</span></label><input type="text" name="job_title" value="{{ drive['job_title'] }}" class="form-control pp-input" required/></div>
            <div class="col-md-6"><label class="form-label pp-label">Location</label><input type="text" name="location" value="{{ drive['location'] or '' }}" class="form-control pp-input"/></div>
            <div class="col-md-6"><label class="form-label pp-label">Package / CTC</label><input type="text" name="package" value="{{ drive['package'] or '' }}" class="form-control pp-input"/></div>
            <div class="col-md-6"><label class="form-label pp-label">Application Deadline</label><input type="date" name="application_deadline" value="{{ drive['application_deadline'] or '' }}" class="form-control pp-input"/></div>
          </div>
          <div class="form-section-title">Job Description</div>
          <div class="mb-3"><textarea name="job_description" rows="5" class="form-control pp-input">{{ drive['job_description'] or '' }}</textarea></div>
          <div class="form-section-title">Eligibility Criteria</div>
          <div class="mb-4"><textarea name="eligibility_criteria" rows="3" class="form-control pp-input">{{ drive['eligibility_criteria'] or '' }}</textarea></div>
          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-pp-primary px-5"><i class="bi bi-save me-2"></i>Save Changes</button>
            <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-pp">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div></div>
</div>
{% endblock %}
